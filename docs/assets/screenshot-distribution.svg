<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#0E1011"/>
  <filter id="shadow" x="300" y="92" width="1000" height="658" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
    <feDropShadow dx="0" dy="34" stdDeviation="42" flood-color="#000000" flood-opacity=".5"/>
  </filter>
  <g filter="url(#shadow)">
    <rect x="380" y="145" width="840" height="540" rx="28" fill="#202223"/>
    <rect x="380.5" y="145.5" width="839" height="539" rx="27.5" stroke="#FFFFFF" stroke-opacity=".13"/>
  </g>

  <image href="app-icon.png" x="438" y="198" width="58" height="58"/>
  <text x="520" y="224" fill="#F7F8F7" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="30" font-weight="780">Install Clippa</text>
  <text x="520" y="258" fill="#A7ADAB" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17">Public release, npm package, and Homebrew tap.</text>

  <g font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="20">
    <rect x="438" y="322" width="724" height="68" rx="16" fill="#0A84FF" fill-opacity=".13"/>
    <text x="468" y="363" fill="#D8ECFF">npx --yes clippa</text>

    <rect x="438" y="412" width="724" height="96" rx="16" fill="#FFFFFF" fill-opacity=".055"/>
    <text x="468" y="450" fill="#E9ECEB">brew tap Vaniawl/clippa</text>
    <text x="468" y="482" fill="#E9ECEB">brew install clippa</text>

    <rect x="438" y="530" width="724" height="68" rx="16" fill="#FFFFFF" fill-opacity=".055"/>
    <text x="468" y="571" fill="#E9ECEB">npx --yes github:Vaniawl/Clippa#main</text>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="650">
    <circle cx="448" cy="642" r="11" fill="#30D158"/>
    <text x="470" y="648" fill="#B8BEBC">CI green</text>
    <circle cx="585" cy="642" r="11" fill="#30D158"/>
    <text x="607" y="648" fill="#B8BEBC">Release live</text>
    <circle cx="753" cy="642" r="11" fill="#30D158"/>
    <text x="775" y="648" fill="#B8BEBC">npm 1.0.12</text>
    <circle cx="920" cy="642" r="11" fill="#30D158"/>
    <text x="942" y="648" fill="#B8BEBC">brew 1.0.12</text>
  </g>

  <text x="380" y="760" fill="#7E8582" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="600">The installed app uses the neutral bundle id app.clippa.Clippa.</text>
</svg>
