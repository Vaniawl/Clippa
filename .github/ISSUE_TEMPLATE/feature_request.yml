name: Feature request
description: Suggest a focused improvement to Clippa.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What clipboard workflow is difficult or missing today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would expect.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note any existing workflow or workaround you tried.

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: This proposal preserves Clippa's local-first clipboard model.
          required: true
