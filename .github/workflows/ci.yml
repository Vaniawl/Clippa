name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: macos-26
    timeout-minutes: 15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Show toolchain
        run: xcodebuild -version

      - name: Run tests
        run: |
          xcodebuild \
            -project Clippa.xcodeproj \
            -scheme Clippa \
            -destination 'platform=macOS' \
            test

  release:
    name: Release Package
    needs: test
    runs-on: macos-26
    timeout-minutes: 15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build and verify release archive
        run: SKIP_TEST=1 ./scripts/release.sh

      - name: Upload verified archive
        uses: actions/upload-artifact@v7
        with:
          name: Clippa-${{ github.sha }}
          path: outputs/Clippa.app.zip
          if-no-files-found: error
          retention-days: 7

  ios:
    name: iOS Companion Build
    runs-on: macos-26
    timeout-minutes: 15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Show toolchain
        run: xcodebuild -version

      - name: Build iPhone companion
        run: |
          xcodebuild \
            -project Clippa.xcodeproj \
            -scheme 'Clippa iOS' \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
