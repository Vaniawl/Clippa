name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: macos-26
    timeout-minutes: 15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Show toolchain
        run: xcodebuild -version

      - name: Run tests
        run: |
          xcodebuild \
            -project Clippa.xcodeproj \
            -scheme Clippa \
            -destination 'platform=macOS' \
            test
